<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error 404</title>

  <!-- Fuentes -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #111 0%, #000 100%);
      color: #fff;
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
      overflow-y: auto;
    }

    /* Efecto leve de luz */
    body::before {
      content: "";
      position: fixed;
      width: 200%;
      height: 200%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.03), transparent);
      animation: flicker 6s infinite;
      z-index: 0;
    }

    @keyframes flicker {
      0%,100% { opacity: 0.2; }
      50% { opacity: 0.05; }
    }

    .container {
      max-width: 700px;
      width: 100%;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    img {
      width: 100%;
      max-width: 550px;
      border: 2px solid gold;
      border-radius: 12px;
      margin-bottom: 25px;
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.3);
      animation: glow 2.5s infinite alternate;
    }

    @keyframes glow {
      from { box-shadow: 0 0 10px rgba(255,215,0,0.2); }
      to { box-shadow: 0 0 30px rgba(255,215,0,0.5); }
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 64px;
      margin: 10px 0;
      letter-spacing: 3px;
    }

    p {
      font-size: 18px;
      opacity: 0.75;
      margin-bottom: 15px;
    }

    .sub {
      font-size: 14px;
      opacity: 0.5;
      letter-spacing: 1px;
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 10px 20px;
      border: 1px solid gold;
      color: gold;
      text-decoration: none;
      border-radius: 6px;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background: gold;
      color: black;
      box-shadow: 0 0 10px gold;
    }

    /* 📱 Optimización móvil */
    @media (max-width: 600px) {
      h1 {
        font-size: 48px;
      }

      p {
        font-size: 16px;
      }

      .sub {
        font-size: 13px;
      }

      img {
        max-width: 100%;
      }

      .container {
        padding: 10px;
      }
    }
  </style>
</head>

<body>

<div class="container">
    
  <!-- Imagen principal -->
  <!--img src="./assets/mantenimiento.png" alt="Error 404">

  <!-- Nueva imagen externa -->
  <img src="https://fotografias-atreseries.atresmedia.com/clipping/cmsimages02/2018/06/06/54229044-BF06-42B7-A62E-AC06B1348713/96.jpg?crop=1574,885,x0,y42&width=1200&height=675&optimize=low&format=webply" alt="Escena">

  <h1>404</h1>

  <p>Esto no existe. Igual que tu suerte</p>

  

</div>

  

  </div>

</body>
</html>
